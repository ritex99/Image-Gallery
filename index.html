<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery </title>
    <script>
      // Workaround for sandbox iframe environments where window.fetch has only a read-only getter
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          let customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return customFetch;
            },
            set(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch (err) {
        console.warn('Fallback defineProperty fetch skipped:', err);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
